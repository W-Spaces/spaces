name: CI

on:
  push:
    branches: [master, main, project-setup]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-v22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v22-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: deno install

      - name: Type-check frontend
        run: deno task typecheck

      - name: Build frontend
        run: deno task build

      - name: Build Tauri app (debug)
        run: deno task tauri build --debug
        env:
          TAURI_SIGNING_PRIVATE_KEY: dummykeyforci
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spaces-debug-windows
          path: src-tauri/target/debug/spaces.exe
          retention-days: 7
